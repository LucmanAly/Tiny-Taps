<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="ow-body" cx="42%" cy="26%" r="88%">
      <stop offset="0%" stop-color="#e8cfa8"/>
      <stop offset="48%" stop-color="#c49a63"/>
      <stop offset="100%" stop-color="#8f6635"/>
    </radialGradient>
    <radialGradient id="ow-belly" cx="45%" cy="25%" r="85%">
      <stop offset="0%" stop-color="#fdf6e3"/>
      <stop offset="100%" stop-color="#e8d3a8"/>
    </radialGradient>
    <radialGradient id="ow-iris" cx="40%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#ffd968"/>
      <stop offset="100%" stop-color="#e8a01f"/>
    </radialGradient>
    <linearGradient id="ow-wing" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#a87c44"/>
      <stop offset="100%" stop-color="#775428"/>
    </linearGradient>
    <filter id="ow-soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- feet -->
  <path d="M78 186 l-6 8 M78 186 l0 9 M78 186 l6 8" stroke="#e8951f" stroke-width="5" stroke-linecap="round"/>
  <path d="M122 186 l-6 8 M122 186 l0 9 M122 186 l6 8" stroke="#e8951f" stroke-width="5" stroke-linecap="round"/>

  <!-- ear tufts -->
  <path d="M60 38 C54 24 58 12 70 16 C70 26 74 34 80 40 Z" fill="url(#ow-body)"/>
  <path d="M140 38 C146 24 142 12 130 16 C130 26 126 34 120 40 Z" fill="url(#ow-body)"/>

  <!-- body -->
  <path d="M100 26 C142 26 160 60 160 110 C160 156 134 188 100 188 C66 188 40 156 40 110 C40 60 58 26 100 26 Z" fill="url(#ow-body)"/>
  <ellipse cx="132" cy="130" rx="22" ry="38" fill="#4f3510" opacity="0.2" filter="url(#ow-soft)"/>
  <ellipse cx="74" cy="52" rx="18" ry="9" fill="#ffffff" opacity="0.4" filter="url(#ow-soft)" transform="rotate(-20 74 52)"/>

  <!-- wings -->
  <path d="M46 92 C30 104 26 130 38 152 C46 164 60 162 62 148 C64 128 58 106 54 92 Z" fill="url(#ow-wing)"/>
  <path d="M154 92 C170 104 174 130 162 152 C154 164 140 162 138 148 C136 128 142 106 146 92 Z" fill="url(#ow-wing)"/>
  <path d="M44 112 q-3 14 4 26 M156 112 q3 14 -4 26" fill="none" stroke="#5f3f1a" stroke-width="3" stroke-linecap="round" opacity="0.5"/>

  <!-- belly with chevrons -->
  <ellipse cx="100" cy="136" rx="38" ry="42" fill="url(#ow-belly)"/>
  <g fill="none" stroke="#c9a468" stroke-width="3" stroke-linecap="round" opacity="0.75">
    <path d="M84 118 l8 7 8-7 8 7 8-7"/>
    <path d="M82 134 l9 7 9-7 9 7 9-7"/>
    <path d="M86 150 l7 6 7-6 7 6 7-6"/>
    <path d="M92 164 l8 6 8-6"/>
  </g>

  <!-- face discs -->
  <circle cx="76" cy="72" r="26" fill="#fdf6e3"/>
  <circle cx="124" cy="72" r="26" fill="#fdf6e3"/>
  <circle cx="76" cy="72" r="26" fill="none" stroke="#c9a468" stroke-width="2" opacity="0.6"/>
  <circle cx="124" cy="72" r="26" fill="none" stroke="#c9a468" stroke-width="2" opacity="0.6"/>

  <!-- eyes -->
  <circle cx="76" cy="72" r="15" fill="url(#ow-iris)"/>
  <circle cx="124" cy="72" r="15" fill="url(#ow-iris)"/>
  <circle cx="76" cy="73" r="8" fill="#38251a"/>
  <circle cx="124" cy="73" r="8" fill="#38251a"/>
  <circle cx="73" cy="70" r="3" fill="#ffffff"/>
  <circle cx="121" cy="70" r="3" fill="#ffffff"/>
  <circle cx="79" cy="76.4" r="1.4" fill="#ffffff" opacity="0.7"/>
  <circle cx="127" cy="76.4" r="1.4" fill="#ffffff" opacity="0.7"/>

  <!-- beak -->
  <path d="M92 84 L108 84 L100 100 Z" fill="#e8951f"/>
  <path d="M94 85.5 L100 90" stroke="#ffca5e" stroke-width="2" stroke-linecap="round" opacity="0.8"/>

  <!-- blush -->
  <ellipse cx="56" cy="94" rx="7" ry="4.8" fill="#ff9d8a" opacity="0.5" filter="url(#ow-soft)"/>
  <ellipse cx="144" cy="94" rx="7" ry="4.8" fill="#ff9d8a" opacity="0.5" filter="url(#ow-soft)"/>
</svg>
