    </filter>
  </defs>
  <!-- tail -->
  <path d="M138 100 L174 72 C170 82 170 92 174 100 C170 108 170 118 174 128 Z" fill="url(#fi-tail)"/>
  <!-- body -->
  <ellipse cx="94" cy="100" rx="52" ry="34" fill="url(#fi-g)"/>
  <ellipse cx="112" cy="112" rx="26" ry="14" fill="#155a78" opacity="0.25" filter="url(#fi-soft)"/>
  <ellipse cx="76" cy="82" rx="18" ry="8" fill="#ffffff" opacity="0.55" filter="url(#fi-soft)" transform="rotate(-16 76 82)"/>
  <!-- top fin -->
  <path d="M78 68 C84 54 104 50 116 58 C106 62 100 68 96 76 Z" fill="url(#fi-tail)"/>
  <!-- side fin -->
  <path d="M96 104 C106 100 116 102 120 110 C112 116 102 116 94 112 Z" fill="#1f6f8f" opacity="0.85"/>
  <!-- scales -->
  <g fill="none" stroke="#1f6f8f" stroke-width="2.4" stroke-linecap="round" opacity="0.4">
    <path d="M96 84 q6 6 0 12"/>
    <path d="M110 84 q6 6 0 12"/>
    <path d="M103 98 q6 6 0 12"/>
  </g>
  <!-- face -->
  <circle cx="62" cy="94" r="6.4" fill="#38251a"/>
  <circle cx="60" cy="91.8" r="2.3" fill="#ffffff"/>
  <path d="M50 108 q6 5 12 2" fill="none" stroke="#155a78" stroke-width="2.6" stroke-linecap="round"/>
  <ellipse cx="70" cy="106" rx="6" ry="4" fill="#ff9d8a" opacity="0.5" filter="url(#fi-soft)"/>
  <!-- bubbles -->
  <circle cx="36" cy="70" r="5" fill="none" stroke="#a5ecec" stroke-width="2.5" opacity="0.9"/>
  <circle cx="28" cy="54" r="3.4" fill="none" stroke="#a5ecec" stroke-width="2.2" opacity="0.7"/>
