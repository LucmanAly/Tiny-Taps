<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="fi-g" cx="38%" cy="30%" r="90%">
      <stop offset="0%" stop-color="#a5ecec"/>
      <stop offset="50%" stop-color="#57c4cf"/>
      <stop offset="100%" stop-color="#2a8aa8"/>
    </radialGradient>
    <linearGradient id="fi-tail" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#57c4cf"/>
      <stop offset="100%" stop-color="#1f6f8f"/>
    </linearGradient>
    <filter id="fi-soft" x="-40%" y="-40%" width="180%" height="180%">
