  <circle cx="52" cy="70" r="10" fill="#fff0a8" opacity="0.9"/>
  <circle cx="148" cy="70" r="10" fill="#fff0a8" opacity="0.9"/>
  <circle cx="74" cy="146" r="7" fill="#ffffff" opacity="0.75"/>
