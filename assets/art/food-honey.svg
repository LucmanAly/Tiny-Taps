<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="fh-pot" cx="40%" cy="28%" r="85%">
      <stop offset="0%" stop-color="#e8c898"/>
      <stop offset="50%" stop-color="#c99a58"/>
      <stop offset="100%" stop-color="#9c6e30"/>
    </radialGradient>
    <radialGradient id="fh-honey" cx="42%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#ffdf80"/>
      <stop offset="100%" stop-color="#e8a416"/>
    </radialGradient>
    <filter id="fh-soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- pot -->
  <path d="M52 84 C40 104 40 140 56 158 C68 172 132 172 144 158 C160 140 160 104 148 84 Z" fill="url(#fh-pot)"/>
  <ellipse cx="100" cy="84" rx="48" ry="14" fill="#8a5e26"/>
  <!-- honey dripping over rim -->
  <path d="M56 82 C56 74 144 74 144 82 C144 90 132 92 126 98 C122 104 124 112 116 112 C108 112 110 100 102 100 C94 100 96 110 88 108 C80 106 84 96 76 94 C68 92 56 90 56 82 Z" fill="url(#fh-honey)"/>
  <ellipse cx="100" cy="78" rx="44" ry="10" fill="#ffdf80"/>
  <!-- label -->
  <ellipse cx="100" cy="128" rx="26" ry="18" fill="#f7ecd8"/>
  <path d="M88 124 h24 M88 132 h24" stroke="#c99a58" stroke-width="4" stroke-linecap="round"/>
  <!-- shine -->
  <ellipse cx="70" cy="108" rx="8" ry="18" fill="#ffffff" opacity="0.3" filter="url(#fh-soft)" transform="rotate(8 70 108)"/>
  <!-- dipper -->
  <g transform="rotate(34 150 60)">
    <rect x="146" y="24" width="8" height="46" rx="4" fill="#b3762a"/>
    <ellipse cx="150" cy="76" rx="16" ry="12" fill="#c99a58"/>
    <path d="M136 70 h28 M134 76 h32 M136 82 h28" stroke="#8a5e26" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
