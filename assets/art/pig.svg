<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="pg-body" cx="42%" cy="28%" r="85%">
      <stop offset="0%" stop-color="#ffe3e8"/>
      <stop offset="48%" stop-color="#ffb0c0"/>
      <stop offset="100%" stop-color="#e87e97"/>
    </radialGradient>
    <radialGradient id="pg-head" cx="40%" cy="30%" r="82%">
      <stop offset="0%" stop-color="#ffe7ec"/>
      <stop offset="52%" stop-color="#ffb6c5"/>
      <stop offset="100%" stop-color="#ec86a0"/>
    </radialGradient>
    <radialGradient id="pg-snout" cx="42%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#ffd2da"/>
      <stop offset="100%" stop-color="#f096ab"/>
    </radialGradient>
    <linearGradient id="pg-earin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff9fb4"/>
      <stop offset="100%" stop-color="#e0708c"/>
    </linearGradient>
    <filter id="pg-soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- curly tail -->
  <path d="M150 148 c10 -2 16 4 14 11 c-2 6 -9 8 -13 4 c-3 -3 -2 -8 2 -9 c3 -1 5 1 4 4"
        fill="none" stroke="#e87e97" stroke-width="6" stroke-linecap="round"/>

  <!-- body -->
  <ellipse cx="100" cy="150" rx="54" ry="40" fill="url(#pg-body)"/>
  <ellipse cx="122" cy="160" rx="30" ry="20" fill="#b0506c" opacity="0.2" filter="url(#pg-soft)"/>
  <ellipse cx="92" cy="152" rx="27" ry="28" fill="#ffd5de" opacity="0.8"/>

  <!-- front legs -->
  <rect x="78" y="154" width="14" height="36" rx="7" fill="url(#pg-head)"/>
  <rect x="108" y="154" width="14" height="36" rx="7" fill="url(#pg-head)"/>
  <rect x="78" y="182" width="14" height="8" rx="4" fill="#d16a86"/>
  <rect x="108" y="182" width="14" height="8" rx="4" fill="#d16a86"/>

  <!-- ears -->
  <path d="M62 52 C52 34 66 24 80 34 C76 42 74 50 74 56 Z" fill="url(#pg-head)"/>
  <path d="M138 52 C148 34 134 24 120 34 C124 42 126 50 126 56 Z" fill="url(#pg-head)"/>
  <path d="M66 48 C62 38 70 32 78 37 C75 43 74 48 74 52 Z" fill="url(#pg-earin)"/>
  <path d="M134 48 C138 38 130 32 122 37 C125 43 126 48 126 52 Z" fill="url(#pg-earin)"/>

  <!-- head -->
  <circle cx="100" cy="80" r="44" fill="url(#pg-head)"/>
  <ellipse cx="122" cy="92" rx="14" ry="20" fill="#b0506c" opacity="0.18" filter="url(#pg-soft)"/>
  <ellipse cx="84" cy="56" rx="16" ry="8.5" fill="#ffffff" opacity="0.45" filter="url(#pg-soft)" transform="rotate(-18 84 56)"/>

  <!-- eyes -->
  <circle cx="80" cy="72" r="6.6" fill="#38251a"/>
  <circle cx="120" cy="72" r="6.6" fill="#38251a"/>
  <circle cx="77.9" cy="69.7" r="2.4" fill="#ffffff"/>
  <circle cx="117.9" cy="69.7" r="2.4" fill="#ffffff"/>
  <circle cx="82.4" cy="75" r="1.1" fill="#ffffff" opacity="0.7"/>
  <circle cx="122.4" cy="75" r="1.1" fill="#ffffff" opacity="0.7"/>

  <!-- blush -->
  <ellipse cx="62" cy="86" rx="8" ry="5.5" fill="#ff8f78" opacity="0.5" filter="url(#pg-soft)"/>
  <ellipse cx="138" cy="86" rx="8" ry="5.5" fill="#ff8f78" opacity="0.5" filter="url(#pg-soft)"/>

  <!-- snout -->
  <ellipse cx="100" cy="94" rx="20" ry="14" fill="url(#pg-snout)"/>
  <ellipse cx="100" cy="94" rx="20" ry="14" fill="none" stroke="#d97a94" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="93" cy="94" rx="3.4" ry="5" fill="#c25a76"/>
  <ellipse cx="107" cy="94" rx="3.4" ry="5" fill="#c25a76"/>
  <ellipse cx="93" cy="88.5" rx="6" ry="2.4" fill="#ffffff" opacity="0.4"/>

  <!-- smile -->
  <path d="M86 110 Q100 118 114 110" fill="none" stroke="#c25a76" stroke-width="2.6" stroke-linecap="round"/>
</svg>
