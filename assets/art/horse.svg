<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="hr-body" cx="42%" cy="28%" r="85%">
      <stop offset="0%" stop-color="#f4d4ac"/>
      <stop offset="48%" stop-color="#d99f62"/>
      <stop offset="100%" stop-color="#a96f35"/>
    </radialGradient>
    <radialGradient id="hr-head" cx="40%" cy="30%" r="82%">
      <stop offset="0%" stop-color="#f6d9b4"/>
      <stop offset="52%" stop-color="#dda668"/>
      <stop offset="100%" stop-color="#b0763a"/>
    </radialGradient>
    <radialGradient id="hr-muzzle" cx="42%" cy="28%" r="80%">
      <stop offset="0%" stop-color="#f8ead2"/>
      <stop offset="100%" stop-color="#dbbf92"/>
    </radialGradient>
    <linearGradient id="hr-mane" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a5426"/>
      <stop offset="100%" stop-color="#5f3714"/>
    </linearGradient>
    <filter id="hr-soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- tail -->
  <path d="M146 132 C168 128 178 142 174 162 C172 174 160 180 152 174 C160 166 160 154 150 148 Z" fill="url(#hr-mane)"/>
  <path d="M168 144 C172 154 170 164 162 170" fill="none" stroke="#a97444" stroke-width="3.5" stroke-linecap="round" opacity="0.6"/>

  <!-- body -->
  <ellipse cx="100" cy="150" rx="52" ry="39" fill="url(#hr-body)"/>
  <ellipse cx="122" cy="160" rx="28" ry="19" fill="#6b3f12" opacity="0.2" filter="url(#hr-soft)"/>
  <ellipse cx="92" cy="153" rx="26" ry="27" fill="#f2ddba" opacity="0.75"/>

  <!-- front legs -->
  <rect x="78" y="152" width="14" height="38" rx="7" fill="url(#hr-head)"/>
  <rect x="108" y="152" width="14" height="38" rx="7" fill="url(#hr-head)"/>
  <rect x="78" y="182" width="14" height="8" rx="4" fill="#5f3714"/>
  <rect x="108" y="182" width="14" height="8" rx="4" fill="#5f3714"/>

  <!-- ears -->
  <path d="M70 40 L64 14 L86 30 Z" fill="url(#hr-head)"/>
  <path d="M130 40 L136 14 L114 30 Z" fill="url(#hr-head)"/>
  <path d="M72 36 L69 22 L81 31 Z" fill="#c2916a"/>
  <path d="M128 36 L131 22 L119 31 Z" fill="#c2916a"/>

  <!-- mane -->
  <path d="M74 34 C70 52 68 72 72 88 C60 80 54 62 60 44 C64 34 70 30 74 34 Z" fill="url(#hr-mane)"/>
  <path d="M78 26 C94 16 112 16 124 28 C130 36 130 44 126 50 C114 36 90 34 78 40 Z" fill="url(#hr-mane)"/>
  <path d="M92 26 Q100 20 110 24" fill="none" stroke="#a97444" stroke-width="3" stroke-linecap="round" opacity="0.6"/>

  <!-- head -->
  <circle cx="100" cy="74" r="43" fill="url(#hr-head)"/>
  <ellipse cx="121" cy="86" rx="13" ry="19" fill="#6b3f12" opacity="0.2" filter="url(#hr-soft)"/>
  <ellipse cx="85" cy="52" rx="15" ry="8" fill="#ffffff" opacity="0.4" filter="url(#hr-soft)" transform="rotate(-18 85 52)"/>
  <!-- forelock -->
  <path d="M86 32 C92 24 106 22 114 30 C108 32 106 38 108 44 C100 36 92 36 86 40 Z" fill="url(#hr-mane)"/>
  <!-- white star -->
  <path d="M100 46 l2.6 5.4 5.9 0.8 -4.3 4.1 1 5.8 -5.2 -2.7 -5.2 2.7 1 -5.8 -4.3 -4.1 5.9 -0.8 Z" fill="#f8ead2" opacity="0.9"/>

  <!-- eyes -->
  <circle cx="80" cy="70" r="6.6" fill="#38251a"/>
  <circle cx="120" cy="70" r="6.6" fill="#38251a"/>
  <circle cx="77.9" cy="67.7" r="2.4" fill="#ffffff"/>
  <circle cx="117.9" cy="67.7" r="2.4" fill="#ffffff"/>
  <circle cx="82.4" cy="73" r="1.1" fill="#ffffff" opacity="0.7"/>
  <circle cx="122.4" cy="73" r="1.1" fill="#ffffff" opacity="0.7"/>

  <!-- blush -->
  <ellipse cx="63" cy="82" rx="7.5" ry="5" fill="#ff9d8a" opacity="0.45" filter="url(#hr-soft)"/>
  <ellipse cx="137" cy="82" rx="7.5" ry="5" fill="#ff9d8a" opacity="0.45" filter="url(#hr-soft)"/>

  <!-- muzzle -->
  <ellipse cx="100" cy="97" rx="24" ry="16" fill="url(#hr-muzzle)"/>
  <ellipse cx="91" cy="94" rx="3.2" ry="4.6" fill="#8a6844"/>
  <ellipse cx="109" cy="94" rx="3.2" ry="4.6" fill="#8a6844"/>
  <path d="M88 106 Q100 112 112 106" fill="none" stroke="#8a6844" stroke-width="2.4" stroke-linecap="round"/>
  <ellipse cx="92" cy="90" rx="6" ry="2.6" fill="#ffffff" opacity="0.4"/>
</svg>
